<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Connexion | Novaë</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{

      background:
      linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
      url("https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1600&auto=format&fit=crop");

      background-size:cover;
      background-position:center;

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;
    }

    .auth-container{

      width:100%;
      max-width:1000px;

      background:white;

      border-radius:30px;

      overflow:hidden;

      display:grid;
      grid-template-columns:1fr 1fr;

      box-shadow:
      0 20px 60px rgba(0,0,0,0.25);
    }

    /* LEFT */

    .auth-left{

      background:
      linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
      url("https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1200&auto=format&fit=crop");

      background-size:cover;
      background-position:center;

      color:white;

      padding:60px;

      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .auth-left h1{

      font-size:55px;

      margin-bottom:20px;

      font-weight:900;
    }

    .auth-left p{

      font-size:18px;

      line-height:1.7;

      color:#f1f1f1;
    }

    /* RIGHT */

    .auth-right{

      padding:60px 50px;

      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .logo{

      color:#ff5a1f;

      font-size:40px;

      font-weight:900;

      margin-bottom:10px;
    }

    .auth-title{

      font-size:34px;

      color:#111;

      margin-bottom:10px;

      font-weight:800;
    }

    .auth-subtitle{

      color:#777;

      margin-bottom:40px;

      font-size:15px;
    }

    .input-group{

      margin-bottom:22px;

      position:relative;
    }

    .input-group i{

      position:absolute;

      left:18px;
      top:50%;

      transform:translateY(-50%);

      color:#999;
    }

    .input-group input{

      width:100%;

      height:58px;

      border:none;

      background:#f5f5f5;

      border-radius:16px;

      padding-left:50px;

      font-size:16px;

      transition:0.3s;
    }

    .input-group input:focus{

      outline:none;

      background:#fff;

      border:2px solid #ff5a1f;
    }

    .forgot{

      display:flex;
      justify-content:flex-end;

      margin-bottom:25px;
    }

    .forgot a{

      color:#ff5a1f;

      font-size:14px;

      text-decoration:none;
    }

    .auth-btn{

      width:100%;

      height:58px;

      border:none;

      border-radius:18px;

      background:#ff5a1f;

      color:white;

      font-size:17px;

      font-weight:700;

      cursor:pointer;

      transition:0.3s;
    }

    .auth-btn:hover{

      background:#111;

      transform:translateY(-2px);
    }

    .divider{

      text-align:center;

      margin:30px 0;

      color:#999;

      position:relative;
    }

    .divider::before{

      content:"";

      position:absolute;

      left:0;
      top:50%;

      width:40%;
      height:1px;

      background:#ddd;
    }

    .divider::after{

      content:"";

      position:absolute;

      right:0;
      top:50%;

      width:40%;
      height:1px;

      background:#ddd;
    }

    .social-login{

      display:flex;

      gap:15px;
    }

    .social-btn{

      flex:1;

      height:55px;

      border:none;

      border-radius:15px;

      background:#f5f5f5;

      cursor:pointer;

      font-size:20px;

      transition:0.3s;
    }

    .social-btn:hover{

      background:#111;

      color:white;
    }

    .bottom-text{

      margin-top:30px;

      text-align:center;

      color:#666;
    }

    .bottom-text a{

      color:#ff5a1f;

      text-decoration:none;

      font-weight:700;
    }

    /* RESPONSIVE */

    @media(max-width:900px){

      .auth-container{

        grid-template-columns:1fr;
      }

      .auth-left{

        display:none;
      }

      .auth-right{

        padding:40px 30px;
      }
    }

  </style>

</head>
<body>

  <div class="auth-container">

    <!-- LEFT -->
    <div class="auth-left">

      <h1>Novaë</h1>

      <p>
        Découvrez une nouvelle génération de mode premium,
        sneakers tendance et accessoires haut de gamme.
      </p>

    </div>

    <!-- RIGHT -->
    <div class="auth-right">

      <div class="logo">Novaë</div>

      <h2 class="auth-title">
        Connexion
      </h2>

      <p class="auth-subtitle">
        Connectez-vous à votre compte
      </p>

      <!-- FORM -->
      <form id="login-form">

        <div class="input-group">

          <i class="fa-solid fa-envelope"></i>

          <input
          type="email"
          placeholder="Adresse email"
          required>

        </div>

        <div class="input-group">

          <i class="fa-solid fa-lock"></i>

          <input
          type="password"
          placeholder="Mot de passe"
          required>

        </div>

        <div class="forgot">

          <a href="#">
            Mot de passe oublié ?
          </a>

        </div>

        <button type="submit" class="auth-btn">
          Se connecter
        </button>

      </form>

      <div class="divider">
        ou
      </div>

      <!-- SOCIAL -->
      <div class="social-login">

        <button class="social-btn">
          <i class="fa-brands fa-google"></i>
        </button>

        <button class="social-btn">
          <i class="fa-brands fa-facebook-f"></i>
        </button>

        <button class="social-btn">
          <i class="fa-brands fa-apple"></i>
        </button>

      </div>

      <div class="bottom-text">

        Vous n'avez pas de compte ?

        <a href="#">
          Créer un compte
        </a>

      </div>

    </div>

  </div>

  <script>

    document
    .getElementById("login-form")
    .addEventListener("submit", function(e){

      e.preventDefault();

      alert("Connexion réussie ✅");

      window.location.href = "index.html";

    });

  </script>

</body>
</html>
